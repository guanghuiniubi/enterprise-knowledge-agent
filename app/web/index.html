<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Agent UI</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-soft: #1a2243;
      --panel-hover: #202a52;
      --text: #edf1ff;
      --subtle: #98a4d5;
      --border: rgba(255,255,255,.1);
      --accent: #7a9bff;
      --success: #2dc997;
      --danger: #ff6b81;
      --warning: #ffcf6b;
      --user: #2e4bbd;
      --assistant: #1b2f57;
      --tool: #193b30;
      --error: #64293a;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #13204b 0%, #0a1022 45%, #080d18 100%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 300px 1fr 440px;
      height: 100vh;
      min-height: 100vh;
      gap: 16px;
      padding: 16px;
    }
    .panel {
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,.25);
      backdrop-filter: blur(16px);
    }
    .sidebar, .inspector { display: flex; flex-direction: column; min-height: 0; }
    .panel-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .title { margin: 0; font-size: 18px; }
    .subtitle { margin: 6px 0 0; color: var(--subtle); font-size: 13px; line-height: 1.6; }
    .sidebar-actions {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    .btn.primary { background: linear-gradient(135deg, #7a9bff, #5775e8); color: white; }
    .btn.secondary { background: rgba(255,255,255,.06); color: var(--text); }
    .btn.danger { background: rgba(255,107,129,.16); color: #ff9ead; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .sessions {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .session-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      cursor: pointer;
    }
    .session-item.active, .session-item:hover { background: var(--panel-hover); }
    .session-item h4 { margin: 0 0 6px; font-size: 14px; }
    .session-item p { margin: 0; color: var(--subtle); font-size: 12px; line-height: 1.5; }
    .session-meta { margin-top: 8px; display: flex; justify-content: space-between; color: var(--subtle); font-size: 11px; gap: 8px; }
    .chat {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 32px);
      min-height: 0;
    }
    .chat-top {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--subtle); }
    .field input, .composer textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      outline: none;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overscroll-behavior: contain;
    }
    .bubble {
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(255,255,255,.08);
    }
    .bubble.user { align-self: flex-end; background: var(--user); }
    .bubble.assistant { align-self: flex-start; background: var(--assistant); }
    .bubble.tool { align-self: flex-start; background: var(--tool); font-size: 13px; }
    .bubble.error { align-self: flex-start; background: var(--error); }
    .composer {
      position: sticky;
      bottom: 0;
      border-top: 1px solid var(--border);
      padding: 14px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, rgba(18, 25, 51, 0.94), rgba(18, 25, 51, 0.99));
      backdrop-filter: blur(14px);
    }
    .composer textarea { min-height: 84px; max-height: 160px; resize: vertical; }
    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
    }
    .composer-actions .btn { flex-shrink: 0; }
    .checkbox { display: inline-flex; align-items: center; gap: 8px; color: var(--subtle); font-size: 13px; }
    .hint { color: var(--subtle); font-size: 12px; flex: 1; line-height: 1.6; }
    .inspector-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .status-box, .inspect-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      padding: 14px;
    }
    .status-box strong { display: block; margin-bottom: 6px; }
    .status-box p, .inspect-card p { margin: 0; color: var(--subtle); font-size: 13px; line-height: 1.7; }
    .inspect-card h3 { margin: 0 0 10px; font-size: 14px; }
    .empty { color: var(--subtle); font-size: 13px; text-align: center; padding: 24px 12px; }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(122,155,255,.16), rgba(255,255,255,.03));
      padding: 12px;
    }
    .metric-label {
      color: var(--subtle);
      font-size: 12px;
    }
    .metric-value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .metric-hint {
      margin-top: 8px;
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.5;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      font-size: 12px;
      color: var(--text);
    }
    .pill.ok { background: rgba(45,201,151,.16); color: #9ef0d2; }
    .pill.firing { background: rgba(255,107,129,.18); color: #ffb9c5; }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .mini-stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,.03);
    }
    .mini-stat span {
      color: var(--subtle);
      font-size: 12px;
    }
    .mini-stat strong {
      display: block;
      margin-top: 6px;
      font-size: 18px;
    }
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .activity-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,.03);
    }
    .activity-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .activity-item span {
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.6;
    }
    @media (max-width: 1260px) {
      .app { grid-template-columns: 1fr; }
      .chat { height: 75vh; }
      .composer-actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const { createApp, ref, computed, onMounted, nextTick } = Vue;

createApp({
  setup() {
    const sessions = ref([]);
    const messages = ref([
      { id: 'welcome', role: 'assistant', content: '你好，我是当前项目的 Agent UI。你现在可以直接体验数据库知识检索、工具调用、流式回答和历史会话能力。右侧还接入了 observability dashboard。' }
    ]);
    const toolCalls = ref([]);
    const agentSteps = ref([]);
    const loading = ref(false);
    const dashboardLoading = ref(false);
    const status = ref('准备就绪');
    const streamMode = ref(true);
    const question = ref('');
    const userId = ref('demo-user');
    const sessionId = ref('session-' + Math.random().toString(36).slice(2, 10));
    const activeSessionId = ref('');
    const messagesEl = ref(null);
    const observabilityOverview = ref(null);
    const observabilityMetrics = ref(null);
    let observabilityTimer = null;

    const canSend = computed(() => !loading.value && question.value.trim().length > 0);
    const kpis = computed(() => observabilityOverview.value?.kpis || []);
    const activeAlerts = computed(() => (observabilityOverview.value?.alerts?.alerts || []).filter(item => item.status === 'firing'));
    const observationLatency = computed(() => observabilityOverview.value?.observations?.latency || {});
    const securityCounters = computed(() => observabilityOverview.value?.counters?.security || {});
    const toolingCounters = computed(() => observabilityOverview.value?.counters?.tooling || {});
    const openCircuitCount = computed(() => Object.values(observabilityOverview.value?.governance?.circuits || {}).filter(item => item.state === 'open').length);
    const recentActivity = computed(() => {
      const items = [];
      if (agentSteps.value.length) {
        items.push({
          title: 'Agent 执行步骤',
          detail: `本轮共执行 ${agentSteps.value.length} 步。`,
        });
      }
      if (toolCalls.value.length) {
        const toolNames = [...new Set(toolCalls.value.map(item => item.tool_name).filter(Boolean))].join('、') || '无';
        items.push({
          title: '使用过的工具',
          detail: `共调用 ${toolCalls.value.length} 次，涉及：${toolNames}`,
        });
      }
      const governance = observabilityOverview.value?.governance || {};
      if (governance.backend) {
        items.push({
          title: '治理运行状态',
          detail: `当前后端 ${governance.backend}，熔断器打开 ${openCircuitCount.value} 个。`,
        });
      }
      return items;
    });

    function scrollToBottom() {
      nextTick(() => {
        if (messagesEl.value) {
          messagesEl.value.scrollTop = messagesEl.value.scrollHeight;
        }
      });
    }

    function resetInspectors() {
      toolCalls.value = [];
      agentSteps.value = [];
    }

    function addMessage(role, content) {
      const id = crypto.randomUUID();
      messages.value.push({ id, role, content });
      scrollToBottom();
      return id;
    }

    function appendMessageContent(messageId, delta) {
      const message = messages.value.find(item => item.id === messageId);
      if (!message) return;
      message.content = `${message.content || ''}${delta || ''}`;
      scrollToBottom();
    }

    function setMessageContent(messageId, content) {
      const message = messages.value.find(item => item.id === messageId);
      if (!message) return;
      message.content = content;
      scrollToBottom();
    }

    function formatToolMessage(event) {
      const output = event.observation || {};
      if (output.error) {
        return `工具 ${event.action} 执行失败：${output.error}`;
      }
      if (Array.isArray(output.results)) {
        return `工具 ${event.action} 已完成，返回 ${output.results.length} 条结果。`;
      }
      if (output.found && output.doc?.title) {
        return `工具 ${event.action} 已读取《${output.doc.title}》。`;
      }
      if (Array.isArray(output.questions)) {
        return `工具 ${event.action} 已生成 ${output.questions.length} 道题目。`;
      }
      return `工具 ${event.action} 已完成，Agent 正在继续整理答案。`;
    }

    function metricValue(kpi) {
      if (!kpi) return '-';
      const value = Number(kpi.value ?? 0);
      if (kpi.unit === 'ratio') {
        return `${(value * 100).toFixed(1)}%`;
      }
      if (kpi.unit === 'ms') {
        return `${value.toFixed(1)} ms`;
      }
      return String(value);
    }

    async function fetchSessions() {
      const res = await fetch('/sessions');
      const data = await res.json();
      sessions.value = data.sessions || [];
    }

    async function fetchObservability() {
      dashboardLoading.value = true;
      try {
        const [overviewRes, metricsRes] = await Promise.all([
          fetch('/observability/overview'),
          fetch('/observability/metrics'),
        ]);
        observabilityOverview.value = await overviewRes.json();
        observabilityMetrics.value = await metricsRes.json();
      } catch (_) {
        status.value = '可观测数据加载失败';
      } finally {
        dashboardLoading.value = false;
      }
    }

    async function loadSession(session) {
      activeSessionId.value = session.session_id;
      sessionId.value = session.session_id;
      userId.value = session.user_id || 'demo-user';
      status.value = '正在加载历史消息…';
      const res = await fetch(`/sessions/${encodeURIComponent(session.session_id)}/messages`);
      const data = await res.json();
      messages.value = (data.messages || []).map(item => ({
        id: item.id,
        role: item.role,
        content: item.content,
      }));
      status.value = `已加载会话 ${session.session_id}`;
      resetInspectors();
      scrollToBottom();
    }

    async function deleteSession(session) {
      await fetch(`/sessions/${encodeURIComponent(session.session_id)}`, { method: 'DELETE' });
      if (activeSessionId.value === session.session_id) {
        startNewSession();
      }
      await fetchSessions();
    }

    function startNewSession() {
      activeSessionId.value = '';
      sessionId.value = 'session-' + Math.random().toString(36).slice(2, 10);
      messages.value = [
        { id: 'welcome-' + Date.now(), role: 'assistant', content: '新会话已创建。你可以继续向 Agent 提问，同时右侧 dashboard 会自动刷新。' }
      ];
      resetInspectors();
      status.value = '新会话已创建';
    }

    async function sendNormal(payload) {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`请求失败：${res.status}`);
      const data = await res.json();
      addMessage('assistant', data.answer || '(无返回)');
      toolCalls.value = data.tool_calls || [];
      agentSteps.value = data.agent_steps || [];
      status.value = `已完成 · route=${data.route}`;
    }

    function parseSseBuffer(buffer) {
      const events = [];
      const parts = buffer.split('\n\n');
      const rest = parts.pop();
      for (const part of parts) {
        const line = part.split('\n').find(item => item.startsWith('data: '));
        if (!line) continue;
        try {
          events.push(JSON.parse(line.slice(6)));
        } catch (_) {}
      }
      return { events, rest };
    }

    async function sendStream(payload) {
      const res = await fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok || !res.body) throw new Error(`流式请求失败：${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let streamingAssistantId = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parsed = parseSseBuffer(buffer);
        buffer = parsed.rest;

        for (const event of parsed.events) {
          if (event.type === 'start') {
            status.value = 'Agent 已启动，正在规划步骤…';
          } else if (event.type === 'answer_delta') {
            if (!streamingAssistantId) {
              streamingAssistantId = addMessage('assistant', '');
            }
            appendMessageContent(streamingAssistantId, event.delta || '');
            status.value = '正在生成回答…';
          } else if (event.type === 'answer_replace') {
            if (!streamingAssistantId) {
              streamingAssistantId = addMessage('assistant', event.answer || '');
            } else {
              setMessageContent(streamingAssistantId, event.answer || '');
            }
            status.value = '正在整理最终回答…';
          } else if (event.type === 'tool_result') {
            messages.value.push({
              id: crypto.randomUUID(),
              role: 'tool',
              content: formatToolMessage(event)
            });
            scrollToBottom();
            status.value = `已完成工具 ${event.action}，继续生成回答…`;
          } else if (event.type === 'final') {
            const result = event.result || {};
            const finalAnswer = result.answer || '(无返回)';
            if (streamingAssistantId) {
              setMessageContent(streamingAssistantId, finalAnswer);
            } else {
              addMessage('assistant', finalAnswer);
            }
            toolCalls.value = result.tool_calls || [];
            agentSteps.value = result.agent_steps || [];
            status.value = `已完成 · route=${result.route}`;
          } else if (event.type === 'error') {
            throw new Error(event.detail || `流式请求失败：${event.status || 'unknown'}`);
          }
        }
      }
    }

    async function submit() {
      const text = question.value.trim();
      if (!text || loading.value) return;
      const payload = {
        user_id: userId.value.trim() || 'demo-user',
        session_id: sessionId.value.trim() || ('session-' + Math.random().toString(36).slice(2, 10)),
        question: text,
      };

      sessionId.value = payload.session_id;
      activeSessionId.value = payload.session_id;
      addMessage('user', text);
      question.value = '';
      resetInspectors();
      loading.value = true;
      status.value = '正在请求 Agent…';

      try {
        if (streamMode.value) {
          await sendStream(payload);
        } else {
          await sendNormal(payload);
        }
        await fetchSessions();
        await fetchObservability();
      } catch (error) {
        addMessage('error', error?.message || String(error));
        status.value = '请求失败';
      } finally {
        loading.value = false;
      }
    }

    onMounted(async () => {
      await fetchSessions();
      await fetchObservability();
      observabilityTimer = setInterval(fetchObservability, 10000);
      scrollToBottom();
    });

    return {
      sessions,
      messages,
      toolCalls,
      agentSteps,
      loading,
      dashboardLoading,
      status,
      streamMode,
      question,
      userId,
      sessionId,
      activeSessionId,
      canSend,
      messagesEl,
      observabilityOverview,
      observabilityMetrics,
      kpis,
      activeAlerts,
      observationLatency,
      securityCounters,
      toolingCounters,
      openCircuitCount,
      recentActivity,
      metricValue,
      formatToolMessage,
      submit,
      startNewSession,
      loadSession,
      deleteSession,
      fetchSessions,
      fetchObservability,
    };
  },
  template: `
    <div class="app">
      <aside class="panel sidebar">
        <div class="panel-header">
          <h1 class="title">Knowledge Agent UI</h1>
          <p class="subtitle">Vue 3 驱动的简易产品化前端，支持历史会话、普通 / 流式问答、工具调用观察与 observability dashboard。当前流式接口为 /chat/stream。</p>
        </div>
        <div class="sidebar-actions">
          <button class="btn primary" @click="startNewSession">+ 新建会话</button>
          <button class="btn secondary" @click="fetchSessions">刷新会话列表</button>
          <button class="btn secondary" @click="fetchObservability" :disabled="dashboardLoading">{{ dashboardLoading ? '刷新观测中…' : '刷新 Dashboard' }}</button>
        </div>
        <div class="sessions">
          <div v-if="!sessions.length" class="empty">当前还没有历史会话，先发起一次问答吧。</div>
          <div
            v-for="session in sessions"
            :key="session.session_id"
            class="session-item"
            :class="{ active: session.session_id === activeSessionId }"
            @click="loadSession(session)"
          >
            <h4>{{ session.session_id }}</h4>
            <p>{{ session.last_message || '暂无内容' }}</p>
            <div class="session-meta">
              <span>{{ session.user_id }}</span>
              <span>{{ session.message_count }} 条</span>
            </div>
            <div class="session-meta">
              <span>{{ session.last_role }}</span>
              <button class="btn danger" style="padding:4px 8px;font-size:11px;" @click.stop="deleteSession(session)">删除</button>
            </div>
          </div>
        </div>
      </aside>

      <main class="panel chat">
        <div class="chat-top">
          <div class="field">
            <label>user_id</label>
            <input v-model="userId" />
          </div>
          <div class="field">
            <label>session_id</label>
            <input v-model="sessionId" />
          </div>
          <div class="field">
            <label>模式</label>
            <label class="checkbox"><input type="checkbox" v-model="streamMode" /> 使用流式问答</label>
          </div>
        </div>

        <div ref="messagesEl" class="messages">
          <div v-for="message in messages" :key="message.id" class="bubble" :class="message.role">
            {{ message.content }}
          </div>
        </div>

        <div class="composer">
          <textarea v-model="question" @keydown.ctrl.enter.prevent="submit" @keydown.meta.enter.prevent="submit" placeholder="例如：请基于当前知识库解释一下当前项目里 Agent 是怎么工作的，或说明为什么需要 rerank 和 fallback 治理"></textarea>
          <div class="composer-actions">
              <div class="hint">聊天记录区域现在可单独滚动，输入框固定在底部。Ctrl/Cmd + Enter 可快速发送。</div>
            <button class="btn primary" :disabled="!canSend" @click="submit">{{ loading ? '处理中…' : '发送问题' }}</button>
          </div>
        </div>
      </main>

      <aside class="panel inspector">
        <div class="panel-header">
          <h2 class="title">Observability + Runtime Panel</h2>
          <p class="subtitle">查看 agent 的运行状态、KPI、告警、治理状态，以及工具调用和 Agent steps，帮助你像运营一个真实应用一样观测它。</p>
        </div>
        <div class="inspector-content">
          <div class="status-box">
            <strong>当前状态</strong>
            <p>{{ status }}</p>
          </div>

          <div class="inspect-card">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;">
              <h3 style="margin:0;">Dashboard 概览</h3>
              <span class="pill" :class="observabilityOverview?.status || 'ok'">{{ observabilityOverview?.status || 'unknown' }}</span>
            </div>
            <div v-if="!observabilityOverview" class="empty">可观测数据尚未加载。</div>
            <template v-else>
              <div class="dashboard-grid">
                <div v-for="kpi in kpis" :key="kpi.key" class="metric-card">
                  <div class="metric-label">{{ kpi.label }}</div>
                  <div class="metric-value">{{ metricValue(kpi) }}</div>
                  <div class="metric-hint">{{ kpi.description }}</div>
                </div>
              </div>
              <div style="margin-top:12px;" class="pill-row">
                <span class="pill">告警数 {{ observabilityOverview.alerts.alert_count }}</span>
                <span class="pill">治理后端 {{ observabilityOverview.governance.backend }}</span>
                <span class="pill">熔断器打开 {{ openCircuitCount }}</span>
              </div>
            </template>
          </div>

          <div class="inspect-card">
            <h3>活动告警</h3>
            <div v-if="!activeAlerts.length" class="empty" style="padding:12px 0;">当前没有 firing 告警。</div>
            <div v-else class="pill-row">
              <span v-for="alert in activeAlerts" :key="alert.name" class="pill firing">{{ alert.name }} · {{ alert.value }}</span>
            </div>
          </div>

          <div class="inspect-card">
            <h3>运行摘要</h3>
            <div class="mini-grid">
              <div class="mini-stat">
                <span>安全计数键数</span>
                <strong>{{ Object.keys(securityCounters).length }}</strong>
              </div>
              <div class="mini-stat">
                <span>工具计数键数</span>
                <strong>{{ Object.keys(toolingCounters).length }}</strong>
              </div>
              <div class="mini-stat">
                <span>延迟观测键数</span>
                <strong>{{ Object.keys(observationLatency).length }}</strong>
              </div>
              <div class="mini-stat">
                <span>指标窗口秒数</span>
                <strong>{{ observabilityMetrics?.window_seconds || '-' }}</strong>
              </div>
            </div>
          </div>

          <div class="inspect-card">
            <h3>最近活动</h3>
            <div v-if="!recentActivity.length" class="empty" style="padding:12px 0;">发送一次问题后，这里会展示简要运行信息。</div>
            <div v-else class="activity-list">
              <div v-for="item in recentActivity" :key="item.title" class="activity-item">
                <strong>{{ item.title }}</strong>
                <span>{{ item.detail }}</span>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </div>
  `,
}).mount('#app');
</script>
</body>
</html>
